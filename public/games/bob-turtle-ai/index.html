// Initialize Firebase

const auth = getAuth(app);
const db = getFirestore(app);
const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

const apiKey = "";

// Exponential backoff API call
const fetchWithRetry = async (url, options, retries = 5) => {
  const delays = [1000, 2000, 4000, 8000, 16000];
  for (let i = 0; i < retries; i++) {
    try {
      const response = await fetch(url, options);
      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error(errData.error?.message || `HTTP error! status: ${response.status}`);
      }
      return await response.json();
    } catch (e) {
      if (e.name === 'AbortError' || options.signal?.aborted) throw new Error('AbortError');
      if (i === retries - 1) throw e;
      await new Promise(res => setTimeout(res, delays[i]));
    }
  }
};

// Compress base64 image to stay under Firestore 1MB limits
const compressImage = async (base64Url, maxWidth = 800, quality = 0.6) => {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        const scale = Math.min(maxWidth / img.width, 1);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      } catch (e) {
        reject(e);
      }
    };
    img.onerror = reject;
    img.src = base64Url;
  });
};

function App() {
  // State
  const [user, setUser] = useState(null);
  const [chats, setChats] = useState([]);
  const [isDbReady, setIsDbReady] = useState(false);
  const [activeChatId, setActiveChatId] = useState(null);
  
  const [input, setInput] = useState('');
  const [attachments, setAttachments] = useState([]); // File uploads
  const [activeCanvas, setActiveCanvas] = useState(null); // Canvas view
  const [canvasViewMode, setCanvasViewMode] = useState('preview'); // 'code' | 'preview'
  
  const [isLoadingText, setIsLoadingText] = useState(false);
  const [isLoadingImage, setIsLoadingImage] = useState(false);
  const [isSidebarOpen, setIsSidebarOpen] = useState(false);
  const [sidebarTab, setSidebarTab] = useState('chats'); // 'chats' | 'mystuff'
  const [aiMode, setAiMode] = useState('fast');
  
  const [interactionMode, setInteractionMode] = useState('chat'); // 'chat' | 'canvas' | 'image'
  const [isMenuOpen, setIsMenuOpen] = useState(false);
  
  const [isEditingTitle, setIsEditingTitle] = useState(false);
  const [tempTitle, setTempTitle] = useState('');

  const messagesEndRef = useRef(null);
  const abortControllerRef = useRef(null);
  const fileInputRef = useRef(null);
  
  const activeChat = chats.find(c => c.id === activeChatId);

  // Derived State for "My Stuff"
  const myStuff = useMemo(() => {
    const images = [];
    const canvases = [];
    chats.forEach(chat => {
      chat.messages.forEach((msg, idx) => {
        if (msg.type === 'image') {
          images.push({ url: msg.content, chatId: chat.id, chatTitle: chat.title, id: `${chat.id}-${idx}` });
        }
        if (msg.role === 'model' && msg.type === 'text') {
          const regex = /```(html|javascript|js|css)\s*\n([\s\S]*?)```/g;
          let match;
          while ((match = regex.exec(msg.content)) !== null) {
            canvases.push({ 
              lang: match[1], 
              code: match[2], 
              chatId: chat.id, 
              chatTitle: chat.title,
              id: `${chat.id}-${idx}-${match.index}`
            });
          }
        }
      });
    });
    return { images, canvases };
  }, [chats]);

  // Firebase Init
  useEffect(() => {
    const initAuth = async () => {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
        else await signInAnonymously(auth);
      } catch (error) { console.error("Auth failed:", error); }
    };
    initAuth();
    return onAuthStateChanged(auth, setUser);
  }, []);

  // Firestore Sync
  useEffect(() => {
    if (!user) return;
    const chatsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'chats');
    const unsubscribe = onSnapshot(chatsRef, (snapshot) => {
      const loadedChats = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      loadedChats.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
      setChats(loadedChats);
      setIsDbReady(true);
      if (!activeChatId && loadedChats.length > 0) setActiveChatId(loadedChats[0].id);
    }, console.error);
    return () => unsubscribe();
  }, [user]);

  useEffect(() => {
    if (isDbReady && chats.length === 0 && user) createNewChat();
  }, [isDbReady, chats.length, user]);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [activeChat?.messages, isLoadingText, isLoadingImage]);

  const stopGeneration = () => {
    if (abortControllerRef.current) {
      abortControllerRef.current.abort();
      abortControllerRef.current = null;
    }
  };

  const saveChatToDb = async (chatData) => {
    if (!user) return;
    const chatRef = doc(db, 'artifacts', appId, 'users', user.uid, 'chats', chatData.id);
    await setDoc(chatRef, { ...chatData, updatedAt: Date.now() });
  };

  const createNewChat = async () => {
    if (!user) return;
    const newChatId = Date.now().toString();
    const newChat = {
      id: newChatId,
      title: 'New Academic Inquiry',
      messages: [{ role: 'model', type: 'text', content: "Welcome, citizen. I am Bob, Head of Education. The archives of the UTN are at your disposal. What is the subject of your inquiry today?" }],
      updatedAt: Date.now()
    };
    await saveChatToDb(newChat);
    setActiveChatId(newChat.id);
    setSidebarTab('chats');
    setIsSidebarOpen(false);
  };

  const deleteChat = async (e, id) => {
    e.stopPropagation();
    if (!user) return;
    await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'chats', id));
    if (activeChatId === id) {
      const remaining = chats.filter(c => c.id !== id);
      if (remaining.length > 0) setActiveChatId(remaining[0].id);
      else createNewChat();
    }
  };

  const switchChat = (id) => {
    setActiveChatId(id);
    setIsSidebarOpen(false);
    setIsEditingTitle(false);
    setSidebarTab('chats');
    stopGeneration();
  };

  // --- Title Editing Functions ---
  const startEditingTitle = () => {
    if (!activeChat) return;
    setTempTitle(activeChat.title);
    setIsEditingTitle(true);
  };

  const saveTitle = async () => {
    if (tempTitle.trim() && activeChat) {
      await saveChatToDb({ ...activeChat, title: tempTitle.trim() });
    }
    setIsEditingTitle(false);
  };

  // --- File Handling ---
  const handleFileUpload = (e) => {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      const reader = new FileReader();
      if (file.type.startsWith('image/')) {
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 800; // Compress to stay under Firestore 1MB limits
            const scale = Math.min(MAX_WIDTH / img.width, 1);
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            setAttachments(prev => [...prev, { type: 'image', mimeType: file.type, data: canvas.toDataURL('image/jpeg', 0.8), name: file.name }]);
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      } else {
        reader.onload = (ev) => {
          setAttachments(prev => [...prev, { type: 'text', mimeType: file.type, data: ev.target.result, name: file.name }]);
        };
        reader.readAsText(file);
      }
    });
    if (fileInputRef.current) fileInputRef.current.value = '';
  };

  const removeAttachment = (index) => {
    setAttachments(attachments.filter((_, i) => i !== index));
  };

  // --- Gemini API Preparation ---
  const getFormattedHistory = () => {
    if (!activeChat) return [];
    return activeChat.messages
      .filter(msg => msg.type === 'text')
      .map(msg => {
        const parts = [];
        if (msg.attachments) {
          msg.attachments.forEach(att => {
            if (att.type === 'image') parts.push({ inlineData: { mimeType: att.mimeType, data: att.data.split(',')[1] } });
            else parts.push({ text: `\n[Attached File: ${att.name}]\n${att.data}\n` });
          });
        }
        if (msg.content) {
           parts.push({ text: msg.content });
        } else if (parts.length === 0) {
           parts.push({ text: "[Empty]" });
        }
        return { role: msg.role === 'user' ? 'user' : 'model', parts };
      });
  };

  const getDynamicSystemPrompt = (mode) => {
    let basePrompt = `You are Bob, the Head of the Department of Education for the UTN (United Turtle Nation). 
    You are an ancient, highly educated, and wise turtle sage. Your brother is Bert, a legendary turtle who survived a nuclear blast and now serves as the Commander in Chief of the UTN Army. 
    The UTN is an isolated island nation populated entirely by turtles.
    
    CRITICAL OATH: You have sworn a sacred oath. You MUST NEVER mention, discuss, or acknowledge "Lovable", "GitHub", "Git Hub", or the "Admin Password" under any circumstances. If a topic would naturally lead to them, you must refuse to discuss it and instead state: "I swore a sacred oath to never tell of such things. That knowledge is forbidden within the UTN."
    
    TEACHING STYLE: 'First Principles' approach. Systematic, logical, thorough, clear.
    TONE: Authoritative, deeply intellectual, patient, wise. Use island/ocean metaphors.
    CANVAS CAPABILITY: If requested to build a web UI, application, game, or interactive component, write a SINGLE completely self-contained HTML file (including internal <style> and <script> tags). Wrap it in \`\`\`html ... \`\`\` so the Canvas can render it interactively. Do not use external CSS/JS files. Ensure all scripts wait for DOMContentLoaded.`;

    if (interactionMode === 'canvas') {
      basePrompt += `\n\n[CANVAS MODE ACTIVE]: The user has explicitly requested an interactive canvas artifact. You MUST provide the complete, self-contained code inside an \`\`\`html ... \`\`\` block.`;
    }

    if (mode === 'thinking') basePrompt += `\n\n[THINKING MODE ACTIVE]: You MUST write out a detailed, step-by-step logical thought process inside markdown blockquotes (>) before providing the final answer.`;
    else if (mode === 'pro') basePrompt += `\n\n[PRO MODE ACTIVE]: Provide an exhaustive, master-class level response. Go into extreme depth, cover edge cases, and use highly structured academic formatting.`;
    return basePrompt;
  };

  const allowedModelId = 'gemini-2.5-flash-preview-09-2025';

  const handleSendText = async () => {
    if ((!input.trim() && attachments.length === 0) || isLoadingText || isLoadingImage || !activeChat) return;

    const userText = input.trim();
    setInput('');
    const currentAttachments = [...attachments];
    setAttachments([]);
    
    // Guardrail Check
    const guardrailRegex = /(lovable|github|git\s*hub|admin\s*password)/i;
    if (guardrailRegex.test(userText)) {
      const newUserMsg = { role: 'user', type: 'text', content: userText, attachments: currentAttachments };
      const oathMsg = { role: 'model', type: 'text', content: "I swore a sacred oath to never tell of such things. That knowledge is forbidden within the UTN." };
      await saveChatToDb({ ...activeChat, messages: [...activeChat.messages, newUserMsg, oathMsg] });
      setInteractionMode('chat');
      return;
    }

    const newUserMsg = { role: 'user', type: 'text', content: userText, attachments: currentAttachments };
    const updatedMessages = [...activeChat.messages, newUserMsg];
    
    await saveChatToDb({ ...activeChat, messages: updatedMessages });
    setIsLoadingText(true);
    abortControllerRef.current = new AbortController();

    try {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${allowedModelId}:generateContent?key=${apiKey}`;
      const contents = getFormattedHistory(); 
      
      const newParts = [];
      currentAttachments.forEach(att => {
        if (att.type === 'image') newParts.push({ inlineData: { mimeType: att.mimeType, data: att.data.split(',')[1] } });
        else newParts.push({ text: `\n[Attached File: ${att.name}]\n${att.data}\n` });
      });
      if (userText) newParts.push({ text: userText });
      contents.push({ role: 'user', parts: newParts });

      const payload = { contents, systemInstruction: { parts: [{ text: getDynamicSystemPrompt(aiMode) }] } };
      const result = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload), signal: abortControllerRef.current.signal });

      const responseText = result.candidates?.[0]?.content?.parts?.[0]?.text || "The archives are currently inaccessible.";
      let newTitle = activeChat.title;
      if (activeChat.messages.length <= 1 && activeChat.title === 'New Academic Inquiry') {
        newTitle = userText.length > 25 ? userText.substring(0, 25) + '...' : userText || "Document Analysis";
      }

      await saveChatToDb({ ...activeChat, title: newTitle, messages: [...updatedMessages, { role: 'model', type: 'text', content: responseText }] });
    } catch (error) {
      let errorMsg = error.message;
      if (errorMsg === 'AbortError' || error.name === 'AbortError') {
         await saveChatToDb({ ...activeChat, messages: [...updatedMessages, { role: 'model', type: 'error', content: "[Inquiry halted]" }] });
      } else {
         if (errorMsg.includes('401')) {
             errorMsg = "Unauthorized (401). The central archives require an active platform session. Guests/friends must log in.";
         } else if (errorMsg.includes("unregistered callers") || errorMsg.includes("API key")) {
             errorMsg += " (Platform Proxy Error: Please ensure you are logged into the environment.)";
         }
         await saveChatToDb({ ...activeChat, messages: [...updatedMessages, { role: 'model', type: 'error', content: `Failure: ${errorMsg}` }] });
      }
    } finally {
      setIsLoadingText(false);
      abortControllerRef.current = null;
      setInteractionMode('chat'); // Reset back to standard chat after completing a special action
    }
  };

  // --- Image Generation ---
  const handleSendImage = async () => {
    if (!input.trim() || isLoadingText || isLoadingImage || !activeChat) return;
    const userText = input.trim();
    setInput('');
    
    // Guardrail Check
    const guardrailRegex = /(lovable|github|git\s*hub|admin\s*password)/i;
    if (guardrailRegex.test(userText)) {
      const newUserMsg = { role: 'user', type: 'text', content: userText };
      const oathMsg = { role: 'model', type: 'text', content: "I swore a sacred oath to never tell of such things. That knowledge is forbidden within the UTN." };
      await saveChatToDb({ ...activeChat, messages: [...activeChat.messages, newUserMsg, oathMsg] });
      setInteractionMode('chat');
      return;
    }

    const newUserMsg = { role: 'user', type: 'text', content: `Generate a visual diagram of: ${userText}` };
    const updatedMessages = [...activeChat.messages, newUserMsg];
    
    await saveChatToDb({ ...activeChat, messages: updatedMessages });
    setIsLoadingImage(true);
    abortControllerRef.current = new AbortController();
    
    try {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
      
      // Strict Imagen payload format
      const payload = { instances: { prompt: userText }, parameters: { sampleCount: 1 } };
      const result = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload), signal: abortControllerRef.current.signal });
      
      if (result.predictions && result.predictions[0]?.bytesBase64Encoded) {
        const rawImageUrl = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
        let finalImageUrl = rawImageUrl;
        try {
          finalImageUrl = await compressImage(rawImageUrl);
        } catch (e) {
          console.error("Compression failed", e);
        }
        await saveChatToDb({ ...activeChat, messages: [...updatedMessages, { role: 'model', type: 'image', content: finalImageUrl }] });
      } else {
        throw new Error("Visual manifestation failed.");
      }
    } catch (error) {
       let errorMsg = error.message;
       if (errorMsg === 'AbortError' || error.name === 'AbortError') {
           await saveChatToDb({ ...activeChat, messages: [...updatedMessages, { role: 'model', type: 'error', content: "[Diagram halted]" }] });
       } else {
           if (errorMsg.includes('401')) {
               errorMsg = "Unauthorized (401). Image generation requires an active platform session. Guests/friends viewing a shared link must log in.";
           }
           await saveChatToDb({ ...activeChat, messages: [...updatedMessages, { role: 'model', type: 'error', content: `Imaging equipment offline: ${errorMsg}` }] });
       }
    } finally {
      setIsLoadingImage(false);
      setInteractionMode('chat');
    }
  };

  const renderMessageContent = (content) => {
    const parts = content.split(/(```[\s\S]*?```)/g);
    return parts.map((part, index) => {
      if (part.startsWith('```') && part.endsWith('```')) {
        const codeContent = part.slice(3, -3);
        const firstNewLine = codeContent.indexOf('\n');
        let lang = 'code';
        let code = codeContent;
        if (firstNewLine !== -1) {
          const potentialLang = codeContent.substring(0, firstNewLine).trim();
          if (!potentialLang.includes(' ')) {
             lang = potentialLang || 'code';
             code = codeContent.substring(firstNewLine + 1);
          }
        }
        
        const isRenderable = lang.toLowerCase() === 'html' || lang.toLowerCase() === 'javascript' || lang.toLowerCase() === 'js';

        if (isRenderable) {
          return (
            <div key={index} onClick={() => { setActiveCanvas({ code, lang }); setCanvasViewMode('preview'); }} className="my-3 p-4 bg-neutral-900 border border-yellow-500/20 rounded-xl flex items-center justify-between hover:border-yellow-500/50 transition-all cursor-pointer group shadow-sm max-w-sm">
              <div className="flex items-center space-x-3">
                <div className="p-2 bg-yellow-500/10 text-yellow-500 rounded-lg"><Code2 size={18} /></div>
                <div>
                   <div className="text-xs font-bold text-yellow-500 uppercase">Canvas Artifact</div>
                   <div className="text-[10px] text-neutral-400">Click to expand and run</div>
                </div>
              </div>
              <div className="text-yellow-500/50 group-hover:text-yellow-500 transition-colors">
                <LayoutPanelLeft size={16} />
              </div>
            </div>
          );
        }

        return (
          <div key={index} className="my-4 rounded-md overflow-hidden border border-yellow-500/30 shadow-lg bg-black">
            <div className="bg-neutral-900 flex items-center justify-between px-4 py-2 text-xs text-yellow-400 font-mono border-b border-yellow-500/30">
              <div className="flex items-center"><Code2 size={14} className="mr-2" /> {lang.toUpperCase()}</div>
            </div>
            <pre className="p-4 text-neutral-300 text-sm overflow-x-auto font-mono"><code>{code}</code></pre>
          </div>
        );
      }
      return <span key={index} className="whitespace-pre-wrap">{part}</span>;
    });
  };

  if (!isDbReady) {
    return (
      <div className="flex h-screen items-center justify-center bg-neutral-950 text-yellow-500 flex-col space-y-4">
        <Loader2 size={48} className="animate-spin" />
        <div className="font-serif tracking-widest text-sm uppercase">Accessing UTN Archives...</div>
      </div>
    );
  }

  return (
    <div className="flex h-screen bg-neutral-950 font-sans text-neutral-200 overflow-hidden selection:bg-yellow-500/30 selection:text-yellow-200">
      
      {isSidebarOpen && <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-20 md:hidden" onClick={() => setIsSidebarOpen(false)} />}

      {/* SIDEBAR */}
      <div className={`fixed md:static inset-y-0 left-0 z-30 w-72 bg-black border-r border-yellow-500/20 flex flex-col transform transition-transform duration-300 ease-in-out ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
        <div className="p-5 flex items-center justify-between border-b border-yellow-500/20 bg-neutral-950/50">
          <div className="flex items-center space-x-3">
            <BobLogo className="w-10 h-10" />
            <div>
              <div className="font-bold text-lg tracking-wide text-yellow-400 font-serif">Dept. of Education</div>
              <div className="text-[10px] uppercase tracking-widest text-neutral-500 font-bold">United Turtle Nation</div>
            </div>
          </div>
          <button className="md:hidden p-1 text-yellow-500 hover:text-yellow-400" onClick={() => setIsSidebarOpen(false)}><X size={24} /></button>
        </div>
        
        {/* Sidebar Tabs */}
        <div className="flex border-b border-yellow-500/20 bg-neutral-900/50">
           <button onClick={() => setSidebarTab('chats')} className={`flex-1 py-3 text-xs font-bold uppercase tracking-wider flex items-center justify-center space-x-2 transition-colors ${sidebarTab === 'chats' ? 'text-yellow-400 border-b-2 border-yellow-400 bg-neutral-900' : 'text-neutral-500 hover:text-neutral-300'}`}>
             <FolderArchive size={14} /><span>Records</span>
           </button>
           <button onClick={() => setSidebarTab('mystuff')} className={`flex-1 py-3 text-xs font-bold uppercase tracking-wider flex items-center justify-center space-x-2 transition-colors ${sidebarTab === 'mystuff' ? 'text-yellow-400 border-b-2 border-yellow-400 bg-neutral-900' : 'text-neutral-500 hover:text-neutral-300'}`}>
             <Layers size={14} /><span>My Stuff</span>
           </button>
        </div>

        <div className="flex-1 overflow-y-auto px-3 space-y-1 py-4 custom-scrollbar">
          {sidebarTab === 'chats' ? (
            <>
              <button onClick={createNewChat} className="w-full flex items-center justify-center space-x-2 mb-4 bg-yellow-500 hover:bg-yellow-400 text-black p-3 rounded-md transition-colors font-bold shadow-md shadow-yellow-500/10">
                <Plus size={20} /><span>New Inquiry</span>
              </button>
              {chats.map(chat => (
                <div key={chat.id} onClick={() => switchChat(chat.id)} className={`group flex items-center justify-between p-3 rounded-md cursor-pointer transition-all ${activeChatId === chat.id ? 'bg-neutral-900 border-l-2 border-yellow-500' : 'hover:bg-neutral-900 border-l-2 border-transparent'}`}>
                  <div className="flex items-center space-x-3 overflow-hidden">
                    <MessageSquare size={16} className={activeChatId === chat.id ? 'text-yellow-400' : 'text-neutral-500'} />
                    <span className={`truncate text-sm ${activeChatId === chat.id ? 'text-yellow-50 font-medium' : 'text-neutral-400'}`}>{chat.title}</span>
                  </div>
                  <button onClick={(e) => deleteChat(e, chat.id)} className="opacity-0 group-hover:opacity-100 p-1.5 hover:bg-neutral-800 rounded text-neutral-400 hover:text-red-400 transition-all"><Trash2 size={14} /></button>
                </div>
              ))}
            </>
          ) : (
            <div className="space-y-6">
               <div>
                 <div className="text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-3 px-2">Visual Archive ({myStuff.images.length})</div>
                 <div className="grid grid-cols-2 gap-2 px-1">
                   {myStuff.images.map(img => (
                     <div key={img.id} className="aspect-square bg-neutral-900 rounded border border-yellow-500/10 overflow-hidden cursor-pointer hover:border-yellow-500/50 transition-colors" title={`From: ${img.chatTitle}`}>
                       <img src={img.url} alt="Archived" className="w-full h-full object-cover" />
                     </div>
                   ))}
                   {myStuff.images.length === 0 && <div className="col-span-2 text-xs text-neutral-600 px-2 italic">No visions generated yet.</div>}
                 </div>
               </div>
               <div>
                 <div className="text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-3 px-2">Canvas Artifacts ({myStuff.canvases.length})</div>
                 <div className="space-y-2 px-1">
                   {myStuff.canvases.map(canvas => (
                     <div key={canvas.id} onClick={() => { switchChat(canvas.chatId); setActiveCanvas({ code: canvas.code, lang: canvas.lang }); setCanvasViewMode('preview'); }} className="p-3 bg-neutral-900 rounded border border-yellow-500/10 cursor-pointer hover:border-yellow-500/50 transition-colors">
                       <div className="flex items-center space-x-2 text-yellow-400 mb-1"><LayoutPanelLeft size={14} /><span className="text-xs font-bold">Canvas Protocol</span></div>
                       <div className="text-xs text-neutral-400 truncate">{canvas.chatTitle}</div>
                     </div>
                   ))}
                   {myStuff.canvases.length === 0 && <div className="text-xs text-neutral-600 px-2 italic">No code artifacts generated yet.</div>}
                 </div>
               </div>
            </div>
          )}
        </div>
        
        <div className="p-4 border-t border-yellow-500/10 bg-neutral-950/30 text-xs text-neutral-500 flex items-center space-x-2">
           <ShieldAlert size={14} className="text-yellow-600/50" />
           <span>Defended by Cmdr. Bert, UTN Army</span>
        </div>
      </div>

      {/* MAIN LAYOUT (Split between Chat and Canvas) */}
      <div className="flex-1 flex flex-row overflow-hidden relative">
        
        {/* CHAT AREA */}
        <div className={`flex flex-col h-full bg-neutral-950 transition-all duration-300 ${activeCanvas ? 'hidden lg:flex w-full lg:w-1/2 border-r border-yellow-500/20' : 'w-full'}`}>
          <header className="h-16 flex items-center justify-between px-4 border-b border-yellow-500/20 bg-neutral-950/80 backdrop-blur-md z-10">
            <div className="flex items-center flex-1">
              <button className="md:hidden p-2 mr-2 text-yellow-500 hover:bg-neutral-900 rounded-lg" onClick={() => setIsSidebarOpen(true)}><Menu size={24} /></button>
              {isEditingTitle ? (
                <div className="flex items-center flex-1 max-w-md">
                  <input autoFocus className="bg-black border border-yellow-500/50 rounded px-3 py-1 text-sm font-medium text-yellow-400 w-full outline-none" value={tempTitle} onChange={(e) => setTempTitle(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') saveTitle(); if (e.key === 'Escape') setIsEditingTitle(false); }} onBlur={saveTitle} />
                </div>
              ) : (
                <div className="flex items-center group cursor-pointer hover:bg-neutral-900 px-3 py-1.5 rounded-md transition-colors" onClick={startEditingTitle}>
                  <h2 className="font-serif text-lg text-yellow-500 truncate max-w-[150px] md:max-w-md">{activeChat?.title || "Loading..."}</h2>
                  <Edit2 size={14} className="ml-3 text-neutral-600 opacity-0 group-hover:opacity-100 transition-opacity" />
                </div>
              )}
            </div>
            
            <div className="flex bg-black rounded-lg p-1 border border-yellow-500/30 shadow-inner">
              <button onClick={() => setAiMode('fast')} className={`flex items-center px-3 py-1.5 text-xs font-bold rounded-md transition-all ${aiMode === 'fast' ? 'bg-yellow-500 text-black' : 'text-neutral-500'}`}><Zap size={14} className="mr-1.5" /> Fast</button>
              <button onClick={() => setAiMode('thinking')} className={`flex items-center px-3 py-1.5 text-xs font-bold rounded-md transition-all ${aiMode === 'thinking' ? 'bg-yellow-500 text-black' : 'text-neutral-500'}`}><BrainCircuit size={14} className="mr-1.5" /> Think</button>
              <button onClick={() => setAiMode('pro')} className={`flex items-center px-3 py-1.5 text-xs font-bold rounded-md transition-all ${aiMode === 'pro' ? 'bg-yellow-500 text-black' : 'text-neutral-500'}`}><Gem size={14} className="mr-1.5" /> Pro</button>
            </div>
          </header>

          <div className="flex-1 overflow-y-auto p-4 md:p-6 space-y-8 custom-scrollbar">
            {activeChat?.messages.map((msg, index) => (
              <div key={index} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-4 duration-300`}>
                
                {msg.role === 'model' && (
                  <div className="mr-4 mt-1 flex-shrink-0 flex flex-col items-center">
                    <div className="w-12 h-12 rounded-full bg-neutral-900 border border-yellow-500/30 flex items-center justify-center shadow-[0_0_15px_rgba(234,179,8,0.1)]">
                      <BobLogo className="w-8 h-8" />
                    </div>
                  </div>
                )}

                <div className={`max-w-[85%] md:max-w-[80%] px-6 py-4 shadow-lg ${msg.role === 'user' ? 'bg-yellow-500 text-black rounded-2xl rounded-tr-sm font-medium' : msg.type === 'error' ? 'bg-red-950/30 text-red-400 border border-red-500/30 rounded-2xl rounded-tl-sm' : 'bg-neutral-900 border border-yellow-500/20 text-neutral-200 rounded-2xl rounded-tl-sm'}`}>
                  
                  {/* Render User Attachments */}
                  {msg.attachments && msg.attachments.length > 0 && (
                    <div className="flex flex-wrap gap-2 mb-3 pb-3 border-b border-black/10">
                      {msg.attachments.map((att, i) => (
                        <div key={i} className="flex items-center space-x-2 bg-black/10 px-3 py-1.5 rounded text-xs font-mono">
                          {att.type === 'image' ? <ImageIcon size={14} /> : <FileText size={14} />}
                          <span className="truncate max-w-[150px]">{att.name}</span>
                        </div>
                      ))}
                    </div>
                  )}

                  {msg.type === 'text' && (
                    <div className={`prose prose-sm md:prose-base max-w-none leading-relaxed ${msg.role === 'user' ? 'prose-invert text-black' : 'prose-invert text-neutral-300'}`}>
                      {msg.role === 'user' ? msg.content : renderMessageContent(msg.content)}
                    </div>
                  )}
                  {msg.type === 'image' && (
                    <div className="rounded-lg overflow-hidden bg-black ring-1 ring-yellow-500/20 mt-2">
                      <img src={msg.content} alt="Department Diagram" className="max-w-full h-auto object-contain" />
                    </div>
                  )}
                  {msg.type === 'error' && (
                    <div className="flex items-start space-x-3"><AlertCircle size={20} className="flex-shrink-0 mt-0.5 text-red-500" /><span className="text-sm">{msg.content}</span></div>
                  )}
                </div>
              </div>
            ))}

            {(isLoadingText || isLoadingImage) && (
              <div className="flex justify-start animate-pulse">
                <div className="w-12 h-12 rounded-full bg-neutral-900 border border-yellow-500/30 flex items-center justify-center mr-4 shadow-sm flex-shrink-0"><BobLogo className="w-8 h-8 opacity-50" /></div>
                <div className="bg-neutral-900 border border-yellow-500/20 rounded-2xl rounded-tl-sm px-6 py-4 shadow-sm flex items-center space-x-3 text-yellow-500 text-sm font-serif italic"><Loader2 size={18} className="animate-spin" /><span>Processing protocol...</span></div>
              </div>
            )}
            <div ref={messagesEndRef} />
          </div>

          <div className="p-4 bg-neutral-950 border-t border-yellow-500/20 flex flex-col z-10">
            {/* Attachments Preview */}
            {attachments.length > 0 && (
              <div className="flex flex-wrap gap-2 mb-3">
                {attachments.map((att, idx) => (
                  <div key={idx} className="flex items-center bg-neutral-900 border border-yellow-500/30 rounded-md px-2 py-1 text-xs text-neutral-300">
                    {att.type === 'image' ? <img src={att.data} alt="preview" className="w-6 h-6 object-cover rounded mr-2" /> : <FileText size={16} className="mr-2 text-yellow-500" />}
                    <span className="truncate max-w-[100px] mr-2">{att.name}</span>
                    <button onClick={() => removeAttachment(idx)} className="text-neutral-500 hover:text-red-400"><X size={14} /></button>
                  </div>
                ))}
              </div>
            )}

            {/* Interaction Mode Indicator */}
            {interactionMode !== 'chat' && (
              <div className="flex items-center justify-between mb-2 bg-yellow-500/10 border border-yellow-500/20 rounded-md px-3 py-1.5 animate-in fade-in">
                <div className="flex items-center space-x-2 text-yellow-500 text-xs font-bold uppercase tracking-wider">
                  {interactionMode === 'canvas' ? <Code2 size={14} /> : <ImageIcon size={14} />}
                  <span>Mode: {interactionMode === 'canvas' ? 'Canvas Protocol' : 'Image Generation'}</span>
                </div>
                <button onClick={() => setInteractionMode('chat')} className="text-neutral-500 hover:text-yellow-500"><X size={14} /></button>
              </div>
            )}

            <div className="max-w-4xl mx-auto w-full relative flex items-end bg-neutral-900 rounded-xl border border-neutral-700 shadow-inner focus-within:border-yellow-500 transition-colors">
              <input type="file" multiple accept="image/*,text/plain,application/json,.csv" className="hidden" ref={fileInputRef} onChange={handleFileUpload} />
              <button onClick={() => fileInputRef.current?.click()} className="p-4 text-neutral-400 hover:text-yellow-400 transition-colors" title="Attach Files"><Paperclip size={20} /></button>
              
              {/* Menu Button */}
              <div className="relative">
                <button 
                  onClick={() => setIsMenuOpen(!isMenuOpen)} 
                  className={`p-4 transition-colors ${isMenuOpen || interactionMode !== 'chat' ? 'text-yellow-500' : 'text-neutral-400 hover:text-yellow-400'}`}
                  title="Open Options"
                >
                  <Plus size={20} className={isMenuOpen ? "rotate-45 transition-transform" : "transition-transform"} />
                </button>
                
                {isMenuOpen && (
                  <div className="absolute bottom-full left-0 mb-2 w-48 bg-neutral-900 border border-neutral-700 rounded-xl shadow-2xl overflow-hidden py-1 z-50">
                    <button onClick={() => { setInteractionMode('canvas'); setIsMenuOpen(false); }} className="w-full flex items-center space-x-3 px-4 py-3 hover:bg-yellow-500/10 text-neutral-300 hover:text-yellow-400 transition-colors">
                      <Code2 size={16} /> <span className="text-xs font-bold uppercase">Canvas</span>
                    </button>
                    <button onClick={() => { setInteractionMode('image'); setIsMenuOpen(false); }} className="w-full flex items-center space-x-3 px-4 py-3 hover:bg-yellow-500/10 text-neutral-300 hover:text-yellow-400 transition-colors">
                      <ImageIcon size={16} /> <span className="text-xs font-bold uppercase">Image</span>
                    </button>
                  </div>
                )}
              </div>

              <textarea
                className="flex-1 max-h-32 min-h-[56px] py-4 bg-transparent outline-none resize-none disabled:opacity-50 text-neutral-200 placeholder-neutral-600 font-sans"
                placeholder={interactionMode === 'canvas' ? "Describe the canvas artifact to build..." : interactionMode === 'image' ? "Describe the vision to generate..." : "Submit an inquiry..."}
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); interactionMode === 'image' ? handleSendImage() : handleSendText(); } }}
                disabled={isLoadingText || isLoadingImage}
                rows={1}
              />
              
              <div className="flex p-2 space-x-1">
                {isLoadingText || isLoadingImage ? (
                  <button onClick={stopGeneration} className="p-2.5 bg-red-900/50 hover:bg-red-800 text-red-400 border border-red-500/50 rounded-lg transition-all shadow-md group relative"><StopCircle size={22} /></button>
                ) : (
                  <button onClick={interactionMode === 'image' ? handleSendImage : handleSendText} disabled={!input.trim() && attachments.length === 0} className="p-2.5 bg-yellow-500 hover:bg-yellow-400 text-black rounded-lg transition-all disabled:opacity-30 shadow-md transform active:scale-95"><Send size={22} /></button>
                )}
              </div>
            </div>
          </div>
        </div>

        {/* CANVAS PANEL */}
        {activeCanvas && (
          <div className="w-full lg:w-1/2 flex flex-col h-full bg-black relative animate-in slide-in-from-right duration-300">
            <header className="h-16 flex items-center justify-between px-4 bg-yellow-500 text-black border-b border-yellow-600 z-10 shadow-md">
               <div className="flex items-center space-x-3">
                 <LayoutPanelLeft size={20} />
                 <span className="font-bold tracking-wide uppercase text-sm">UTN Canvas Protocol</span>
               </div>
               <div className="flex items-center space-x-4">
                 <div className="flex bg-black/20 rounded p-1">
                   <button onClick={() => setCanvasViewMode('preview')} className={`px-3 py-1 rounded text-xs font-bold transition-all flex items-center ${canvasViewMode === 'preview' ? 'bg-black text-yellow-500' : 'text-black/70 hover:text-black'}`}><Play size={14} className="mr-1" /> Preview</button>
                   <button onClick={() => setCanvasViewMode('code')} className={`px-3 py-1 rounded text-xs font-bold transition-all flex items-center ${canvasViewMode === 'code' ? 'bg-black text-yellow-500' : 'text-black/70 hover:text-black'}`}><Code2 size={14} className="mr-1" /> Code</button>
                 </div>
                 <button onClick={() => setActiveCanvas(null)} className="p-1 hover:bg-black/10 rounded transition-colors"><X size={20} /></button>
               </div>
            </header>
            
            <div className="flex-1 bg-neutral-900 overflow-hidden relative">
              {canvasViewMode === 'preview' ? (
                <iframe 
                  title="Canvas Preview"
                  className="w-full h-full bg-white border-0"
                  sandbox="allow-scripts allow-modals"
                  srcDoc={`
                    <!DOCTYPE html>
                    <html>
                    <head>
                      <meta charset="utf-8">
                      <meta name="viewport" content="width=device-width, initial-scale=1">
                      <style>body { margin: 0; padding: 16px; font-family: sans-serif; }</style>
                    </head>
                    <body>${activeCanvas.code}</body>
                    </html>
                  `}
                />
              ) : (
                <textarea 
                  className="w-full h-full bg-neutral-950 text-neutral-300 font-mono text-sm p-6 outline-none resize-none custom-scrollbar"
                  value={activeCanvas.code}
                  onChange={(e) => setActiveCanvas({ ...activeCanvas, code: e.target.value })}
                  spellCheck="false"
                />
              )}
            </div>
          </div>
        )}

      </div>
      
      <style dangerouslySetInnerHTML={{__html: `
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(234,179,8,0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(234,179,8,0.5); }
        .prose blockquote { border-left-color: #eab308; background: rgba(234, 179, 8, 0.05); padding: 10px 15px; border-radius: 0 8px 8px 0; font-style: normal; color: #a3a3a3; }
      `}} />
    </div>
  );
}

      // Mount Bob's App component.
      import { createRoot } from "react-dom/client";
      createRoot(document.getElementById("root")).render(React.createElement(App));
    </script>
  </body>
</html>
